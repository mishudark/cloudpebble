name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-slim
    strategy:
      matrix:
        go-version: ["1.26"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -v -count=1 ./pkg/...

      - name: Test (race detector)
        run: go test -v -race -count=1 ./pkg/...

      # - name: Fuzz tests (short)
      #   run: go test -fuzz=Fuzz -fuzztime=10s ./pkg/...

      # - name: Benchmarks
      #   run: go test -bench=. -benchmem -benchtime=100ms ./pkg/...

  lint:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  vet:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: Check go.mod tidiness
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
